<body>

  <h1>Three books I have read</h1>
 <div class="container">
    <div class="card">
      <img src="The Litigators By John Grisham.jpg" alt="Book 1">
      <div class="card-content">
        <h3>The Litigators by John Grisham</h3>
        <p>A legal thriller about a lawyer suing big companies.</p>
      </div>
    </div>
    <div class="card">
      <img src="restore me.jpg" alt="Book 2">
      <div class="card-content">
        <h3>Restore Me by Tahereh Mafi</h3>
        <p>A dystopian story about a girl fighting a bad government.</p>
      </div>
    </div>
    <div class="card">
      <img src="Valour_ The Faithful and the Fallen 02_ 2.jpg" alt="Book 3">
      <div class="card-content">
        <h3>Valour by John Gwynne</h3>
        <p>A fantasy story about warriors fighting evil gods.</p>
      </div>
    </div>

  </div>
